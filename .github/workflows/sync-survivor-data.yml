name: "Sync survivoR data"

on:
  push:
    paths:
      - '.github/workflows/sync-survivor-data.yml'
  schedule:
    - cron: '0 14 * * *' # Daily at 14:00 UTC
  workflow_dispatch:

concurrency:
  group: survivor-data-sync
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Write Firebase service account key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SURVIVOR_FANTASY_51C4B }}' > firebase-private-key.json
          chmod 600 firebase-private-key.json

      - name: Run sync script
        env:
          VITE_FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}
        run: yarn tsx scripts/sync-season.ts

      - name: Parse sync result
        id: result
        if: always()
        run: |
          if [ ! -f sync-result.json ]; then
            echo "sync-result.json not found - script may have crashed"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "error=sync-result.json not found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(jq -r '.changed' sync-result.json)
          SEASON=$(jq -r '.seasonNum' sync-result.json)
          IS_NEW=$(jq -r '.isNewSeason' sync-result.json)
          ERROR=$(jq -r '.error // empty' sync-result.json)
          FIRESTORE=$(jq -r '.firestorePushed // false' sync-result.json)
          EPISODES=$(jq -r '.summary.episodes // 0' sync-result.json)
          CHALLENGES=$(jq -r '.summary.challenges // 0' sync-result.json)
          ELIMINATIONS=$(jq -r '.summary.eliminations // 0' sync-result.json)
          EVENTS=$(jq -r '.summary.events // 0' sync-result.json)

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "season=$SEASON" >> "$GITHUB_OUTPUT"
          echo "is_new=$IS_NEW" >> "$GITHUB_OUTPUT"
          echo "error<<ERREOF" >> "$GITHUB_OUTPUT"
          echo "$ERROR" >> "$GITHUB_OUTPUT"
          echo "ERREOF" >> "$GITHUB_OUTPUT"
          echo "firestore=$FIRESTORE" >> "$GITHUB_OUTPUT"
          echo "episodes=$EPISODES" >> "$GITHUB_OUTPUT"
          echo "challenges=$CHALLENGES" >> "$GITHUB_OUTPUT"
          echo "eliminations=$ELIMINATIONS" >> "$GITHUB_OUTPUT"
          echo "events=$EVENTS" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.result.outputs.changed == 'true' && steps.result.outputs.error == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEASON: ${{ steps.result.outputs.season }}
          IS_NEW: ${{ steps.result.outputs.is_new }}
          EPISODES: ${{ steps.result.outputs.episodes }}
          CHALLENGES: ${{ steps.result.outputs.challenges }}
          ELIMINATIONS: ${{ steps.result.outputs.eliminations }}
          EVENTS: ${{ steps.result.outputs.events }}
        run: |
          if [ "$IS_NEW" = "true" ]; then
            BRANCH="auto/survivor-new-season-${SEASON}"
            PR_TITLE="feat: bootstrap season ${SEASON} from survivoR"
            COMMIT_MSG="feat: bootstrap season ${SEASON} from survivoR data"
          else
            BRANCH="auto/survivor-sync-season-${SEASON}"
            PR_TITLE="chore: sync season ${SEASON} data from survivoR"
            COMMIT_MSG="chore: sync season ${SEASON} data from survivoR"
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Always create/recreate branch from current HEAD (main + sync changes).
          # The sync script already wrote the updated files, so we just need to
          # branch, commit, and push. Force-push is safe for bot-managed branches.
          git checkout -B "$BRANCH"

          # Stage and commit
          git add src/data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "$COMMIT_MSG"
          git push --force-with-lease -u origin "$BRANCH"

          # Create PR if none exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            PR_BODY="$(cat <<EOF
## Automated survivoR data sync

**Season:** ${SEASON}
**Type:** $([ "$IS_NEW" = "true" ] && echo "New season bootstrap" || echo "Episode data update")

### Changes
- Episodes: ${EPISODES}
- Challenges: ${CHALLENGES}
- Eliminations: ${ELIMINATIONS}
- Events: ${EVENTS}

$([ "$IS_NEW" = "true" ] && echo "### Note
Player images are not available during automated bootstrap. Run \`yarn new-season ${SEASON} --force\` locally to backfill images and bios from the wiki." || echo "")

---
*This PR was created automatically by the [survivoR data sync workflow](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).*
EOF
)"
            gh pr create --title "$PR_TITLE" --body "$PR_BODY" --base main
          else
            echo "PR #${EXISTING_PR} already exists for branch ${BRANCH}"
          fi

      - name: Write job summary
        if: always()
        env:
          SEASON: ${{ steps.result.outputs.season }}
          CHANGED: ${{ steps.result.outputs.changed }}
          SYNC_ERROR: ${{ steps.result.outputs.error }}
          FIRESTORE: ${{ steps.result.outputs.firestore }}
          EPISODES: ${{ steps.result.outputs.episodes }}
          CHALLENGES: ${{ steps.result.outputs.challenges }}
          ELIMINATIONS: ${{ steps.result.outputs.eliminations }}
          EVENTS: ${{ steps.result.outputs.events }}
        run: |
          {
            echo "## survivoR Data Sync"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Season | ${SEASON:-unknown} |"
            echo "| Changes found | ${CHANGED:-unknown} |"
            echo "| Firestore pushed | ${FIRESTORE:-false} |"

            if [ "$CHANGED" = "true" ]; then
              echo "| Episodes | ${EPISODES} |"
              echo "| Challenges | ${CHALLENGES} |"
              echo "| Eliminations | ${ELIMINATIONS} |"
              echo "| Events | ${EVENTS} |"
            fi

            if [ -n "$SYNC_ERROR" ]; then
              echo ""
              echo "### Error"
              echo "\`\`\`"
              echo "$SYNC_ERROR"
              echo "\`\`\`"
            fi

            if [ "$FIRESTORE" = "true" ] && [ "$CHANGED" = "true" ] && [ -n "$SYNC_ERROR" ]; then
              echo ""
              echo "### Divergence"
              echo "Firestore was updated but an error occurred. The codebase may be out of sync."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          rm -f firebase-private-key.json
          rm -f sync-result.json

      - name: Fail on error
        if: always() && steps.result.outputs.error != ''
        env:
          SYNC_ERROR: ${{ steps.result.outputs.error }}
        run: |
          echo "Sync failed: $SYNC_ERROR"
          exit 1
